        MAINTAINER NOTES
        ----------------
        The public authoring API has been moved to PointClickEngine_API_Reference.
        Keep code comments here limited to engine architecture and maintenance
        constraints. Do not reintroduce long authoring/API documentation here.

        Deployment remains deliberately simple: index.html is the generic engine
        and bootloader; games.json lists games for web-server use; games.js is the
        direct-file fallback; each game normally lives in <gameid>/ with assets
        below rooms/, characters/, objects/, ui/, music/ and sounds/.

        Core architectural rule: there is one canonical runtime state, one player
        actor, one inventory, one movement path, one interaction dispatcher, one
        dialogue/presentation path and one save/load/reset path. Game content must
        mutate state through the public script api object, not by reaching into
        private engine structures.
    -->

    var Engine = {};
    // Engine is deliberately private inside this closure. The browser global
    // window.PointClickEngine is assigned later to a frozen public facade that
    // exposes only registration and version/capability metadata for content
    // scripts and authoring tools.
    Engine.Private = {};
    Engine.Games = {};
    Engine.CurrentGame = null;
    Engine.Canvas = document.getElementById('gameCanvas');
    Engine.Ctx = Engine.Canvas.getContext('2d');
    Engine.Ctx.imageSmoothingEnabled = false;

    Engine.State = {
        mode: 'boot', gameId: null, currentRoomId: null, selectedVerbId: 'walkTo', selectedInventoryItemId: null,
        hoveredTargetId: null, hoveredInventoryItemId: null, pointerX: 0, pointerY: 0, pendingCommand: null,
        activeCutscene: null, cutsceneQueue: [], activeOverlay: null, flags: {}, variables: {}, dialogueMemory: {}, inputPrompt: null, geometry: { activeTriggers:{} }, transitionDebounce: { roomId:null, zoneId:null, active:false }, scopedVariables: { rooms:{}, characters:{}, items:{} }, roomStates: {}, objectStates: {}, characterStates: {}, inventory: [], inventoryScroll: 0,
        endGame: { title: '', text: '', endingId: null, background: null, animation: null, animationStarted: 0 },
        gameStarted: false,
        previousMode: null,
        saveLoadList: [], saveLoadMessage: '', debugMessages: [], playerTrail: [],
        audio: { musicVolume: 0.25, sfxVolume: 0.75, musicMuted: false, sfxMuted: false },
        dialogue: { active: false, speakerId: null, speakerName: '', text: '', displayText: '', timer: 0, duration: 0, explicitDuration: null, options: [], onComplete: null, voiceAudio: null, lifecycleToken: null, color: null, textBlocks: [], textBlockIndex: 0, choiceScroll: 0 },
        player: { id: 'player', roomId: null, x: 80, y: 112, facing: 'down', animation: 'idleDown', visible: true, controllable: true, speed: 48, walkTarget: null, walkPath: [], walkCallback: null, spriteId: null, scale: 1 },
        lifecycle: { sessionId: 0, roomId: 0, commandId: 0, dialogueId: 0, cutsceneId: 0, movementId: 0, characterMoveId: 0, objectAnimationId: 0, characterMoveIds: {}, objectAnimationIds: {} },
        debug: false
    };

    Engine.Assets = {
        images: {}, music: null, musicSrc: null,
        RolePrefixes:{ roomBackground:'rooms/', titleBackground:'rooms/', endBackground:'rooms/', character:'characters/', itemIcon:'objects/', itemWorld:'objects/', hotspot:'objects/', ui:'ui/', overlay:'objects/', map:'objects/', music:'music/', sound:'sounds/', voice:'sounds/' },
        ImageRolePrefixes:{ roomBackground:'rooms/', titleBackground:'rooms/', endBackground:'rooms/', character:'characters/', itemIcon:'objects/', itemWorld:'objects/', hotspot:'objects/', ui:'ui/', overlay:'objects/', map:'objects/' },
        NormalizePath:function (path, role) {
            if (!path || typeof path !== 'string') { throw new Error('Invalid asset path for '+(role||'asset')+'.');
            }
            if (path.indexOf('data:')===0) { throw new Error('Embedded data: assets are not allowed; use external files in the canonical asset directory for '+(role||'asset')+'.');
            }
            if (/^(https?:)?\/\//.test(path)) { throw new Error('Remote assets are not allowed: '+path); }
            if (path.indexOf('\\')>=0 || path.indexOf('..')>=0 || path.charAt(0)==='/') { throw new Error('Asset path must be a simple relative path inside the game asset folder: '+path);
            }
            var prefix=this.RolePrefixes[role||'']||null;
            if (prefix) {
                if (path.indexOf(prefix)===0) { return path;
                }
                if (path.indexOf('/')>=0) { throw new Error('Asset path for '+role+' must be a filename or be in '+prefix+': '+path);
                }
                return prefix+path;
            }
            return path;
        },
        ValidateImagePath:function (path, role) {
            var normal=this.NormalizePath(path,role);
            if (!/\.png$/i.test(normal)) { throw new Error('Image path must refer to a .png file: '+path);
            }
            return true;
        },
        NormalizeImagePath:function (path, role) { this.ValidateImagePath(path,role);
            return this.NormalizePath(path,role);
        },
        QueueImage:function (list,path,role) { if (!path) { return;
            } list.push({path:this.NormalizeImagePath(path,role),role:role});
        },
        Resolve: function (path, role) {
            var normal=this.NormalizePath(path,role);
            if (!Engine.CurrentGame) { return normal;
            }
            return Engine.CurrentGame.assetPath + normal;
        },
        LoadImage: function (path, role) {
            var resolved = this.Resolve(path, role);
            if (this.images[resolved]) { return Promise.resolve(this.images[resolved]);
            }
            return new Promise(function (resolve, reject) {
                var img = new Image();
                img.onload = function () { Engine.Assets.images[resolved] = img;
                    resolve(img);
                };
                img.onerror = function () { reject(new Error('Could not load image: ' + resolved));
                };
                img.src = resolved;
            });
        },
        GetImage: function (path, role) { return this.images[this.Resolve(path,role)] || null;
        },
        ApplyAudioSettings: function () {
            if (this.music) { this.music.volume = Engine.State.audio.musicMuted ? 0 : Engine.State.audio.musicVolume;
            }
        },
        TryPlayMusic: function () {
            if (!this.music) { return;
            }
            this.ApplyAudioSettings();
            var playPromise = this.music.play();
            if (playPromise && playPromise.catch) { playPromise.catch(function () {});
            }
        },
        PlayMusic: function (sources) {
            if (!sources || !sources.length) { this.StopMusic();
                return;
            }
            var src = this.Resolve(sources[0],'music');
            if (this.musicSrc === src && this.music) {
                this.ApplyAudioSettings();
                if (this.music.paused) { this.TryPlayMusic();
                }
                return;
            }
            this.StopMusic();
            var audio = new Audio();
            audio.preload = 'metadata';
            audio.loop = true;
            audio.src = src;
            audio.volume = Engine.State.audio.musicMuted ? 0 : Engine.State.audio.musicVolume;
            audio.onerror = function () { if (Engine.Assets.music === audio) { Engine.Assets.StopMusic();
                } };
            this.music = audio;
            this.musicSrc = src;
            this.TryPlayMusic();
        },
        StopMusic: function () { if (this.music) { this.music.pause();
                this.music.src = '';
            } this.music = null;
            this.musicSrc = null;
        },
        PlaySound: function (sources) {
            if (!sources || !sources.length || Engine.State.audio.sfxMuted) { return;
            }
            var audio = new Audio(this.Resolve(sources[0],'sound'));
            audio.preload = 'auto';
            audio.volume = Engine.State.audio.sfxVolume;
            audio.onerror = function () {};
            var playPromise = audio.play();
            if (playPromise && playPromise.catch) { playPromise.catch(function () {});
            }
        }
    };
    // DEBUG, HOOK AND SCOPED VARIABLE SYSTEMS
    // --------------------------------------
    // Engine.Debug is the central diagnostic path for content-authoring mistakes.
    // It logs to the browser console and keeps a short in-memory message list so
    // a future debug UI can display recent problems without each game script
    // inventing its own logger.
    //
    // Engine.Hooks is the single lifecycle-hook dispatcher. Hook scripts are
    // normal game scripts looked up by name in game.scripts. They receive
    // (api, context), where context is a frozen read-only snapshot. Hook entries
    // may be a single script name or an array of script names. Boolean hooks are
    // the before... hooks; only they may return false to cancel the operation.
    // Void hooks are notifications, must not return values, and always run every
    // listed script. Missing hook scripts are validation errors; runtime dispatch
    // also fails safe for boolean hooks.
    //
    // Engine.ScopedVariables stores per-room, per-character and per-item variables
    // in Engine.State.scopedVariables. Game scripts must use the public API
    // wrappers rather than writing directly to this object. Values are deliberately
    // restricted to strings and finite numbers so saves remain stable and puzzle
    // state stays easy to inspect. Arithmetic helpers operate only on numbers and
    // report detailed debug warnings for bad scope names, bad ids, missing scripts,
    // arithmetic on strings, non-finite numbers and division by zero.
    Engine.Debug = {
        MaxMessages:120,
        SafeString: function (value) {
            if (value === undefined) { return 'undefined';
            }
            if (value === null) { return 'null';
            }
            if (typeof value === 'string') { return value;
            }
            if (typeof value === 'number' || typeof value === 'boolean') { return String(value);
            }
            try { return JSON.stringify(value);
            }
            catch (err) { return '[unserializable]';
            }
        },
        SanitiseCode: function (code) {
            var text=String(code||'GENERAL').toUpperCase().replace(/[^A-Z0-9_]/g,'_');
            return text || 'GENERAL';
        },
        FormatDetails: function (details) {
            if (!details || typeof details !== 'object') { return '';
            }
            var keys=Object.keys(details).sort();
            if (!keys.length) { return '';
            }
            return keys.map(function (key) { return key+'='+Engine.Debug.SafeString(details[key]);
            }).join(' ');
        },
        Add: function (level, code, message, details) {
            if (message === undefined) {
                message=code;
                code='GENERAL';
            }
            level=String(level||'INFO').toUpperCase();
            code=this.SanitiseCode(code);
            message=String(message||'');
            var detailText=this.FormatDetails(details);
            var line='[PCE]['+level+']['+code+'] '+message+(detailText ? ' | '+detailText : '');
            if (window.console) {
                if (level === 'ERROR' && console.error) { console.error(line);
                }
                else if (level === 'WARN' && console.warn) { console.warn(line);
                }
                else if (console.log) { console.log(line);
                }
            }
            Engine.State.debugMessages=Engine.State.debugMessages||[];
            Engine.State.debugMessages.push({ level:level, code:code, message:message, details:details||null, text:line });
            while (Engine.State.debugMessages.length>this.MaxMessages) { Engine.State.debugMessages.shift();
            }
            return line;
        },
        Warn: function (code, message, details) { return this.Add('WARN',code,message,details);
        },
        Error: function (code, message, details) { return this.Add('ERROR',code,message,details);
        },
        Info: function (code, message, details) { return this.Add('INFO',code,message,details);
        },
        GetLines: function () {
            return (Engine.State.debugMessages||[]).map(function (entry) {
                return entry && entry.text ? entry.text : Engine.Debug.SafeString(entry);
            });
        },
        GetReport: function () {
            var lines=[];
            lines.push('PointClickEngine diagnostics');
            lines.push('engineApi='+ENGINE_API_VERSION+' saveDataVersion='+SAVE_DATA_VERSION);
            lines.push('gameId='+(Engine.State.gameId||'')+' mode='+(Engine.State.mode||'')+' room='+(Engine.State.currentRoomId||''));
            lines.push('selectedVerb='+(Engine.State.selectedVerbId||'')+' inventoryItem='+(Engine.State.selectedInventoryItemId||''));
            if (Engine.State.bootError) { lines.push('bootError='+Engine.State.bootError);
            }
            lines.push('messages:');
            var messages=this.GetLines();
            if (!messages.length) { lines.push('(none)');
            }
            else { messages.forEach(function (line) { lines.push(line);
                });
            }
            return lines.join('\n');
        },
        CopyReport: function () {
            var report=this.GetReport();
            if (window.navigator && navigator.clipboard && navigator.clipboard.writeText) {
                try { navigator.clipboard.writeText(report).catch(function () {});
                }
                catch (err) {}
            }
            return report;
        }
    };
    if (window.addEventListener) {
        window.addEventListener('error',function (event) {
            Engine.Debug.Error('JS_UNCAUGHT','Uncaught JavaScript error.',{ message:event.message||'', source:event.filename||'', line:event.lineno||0, column:event.colno||0 });
        });
        window.addEventListener('unhandledrejection',function (event) {
            var reason=event && event.reason ? event.reason : null;
            Engine.Debug.Error('JS_UNHANDLED_PROMISE','Unhandled promise rejection.',{ reason:reason && reason.message ? reason.message : Engine.Debug.SafeString(reason) });
        });
    }
    // LIFECYCLE GUARDS
    // ----------------
    // Browser JavaScript is single-threaded for this engine's ordinary gameplay
    // code, but movement callbacks, dialogue callbacks, cutscene continuations,
    // character movement completions and object animation completions can fire
    // later, after a new game, load, ending, room change or superseding action.
    // Engine.Lifecycle gives those deferred engine callbacks a short-lived token
    // and refuses to run them if the token no longer matches the current session,
    // room or operation. These counters are transient runtime guards, not saved
    // puzzle state. Game scripts should not read or write them.
    Engine.Lifecycle = {
        Ensure: function () {
            if (!Engine.State.lifecycle) { Engine.State.lifecycle = {};
            }
            var l=Engine.State.lifecycle;
            ['sessionId','roomId','commandId','dialogueId','cutsceneId','movementId','characterMoveId','objectAnimationId'].forEach(function (name) {
                if (typeof l[name] !== 'number') { l[name]=0;
                }
            });
            if (!l.characterMoveIds || typeof l.characterMoveIds !== 'object') { l.characterMoveIds={};
            }
            if (!l.objectAnimationIds || typeof l.objectAnimationIds !== 'object') { l.objectAnimationIds={};
            }
            return l;
        },
        Capture: function (options) {
            options=options||{};
            var l=this.Ensure();
            var token={ sessionId:l.sessionId };
            if (options.room) { token.roomId=l.roomId;
            }
            if (options.command) { token.commandId=l.commandId;
            }
            if (options.dialogue) { token.dialogueId=l.dialogueId;
            }
            if (options.cutscene) { token.cutsceneId=l.cutsceneId;
            }
            if (options.movement) { token.movementId=l.movementId;
            }
            if (options.characterMove) { token.characterId=options.characterId||options.actorId||null;
                token.characterMoveId=token.characterId ? (l.characterMoveIds[token.characterId]||0) : l.characterMoveId;
            }
            if (options.objectAnimation) { token.objectId=options.objectId||options.targetId||null;
                token.objectAnimationId=token.objectId ? (l.objectAnimationIds[token.objectId]||0) : l.objectAnimationId;
            }
            return token;
        },
        IsCurrent: function (token) {
            if (!token) { return false;
            }
            var l=this.Ensure();
            if (token.sessionId !== l.sessionId) { return false;
            }
            if (Object.prototype.hasOwnProperty.call(token,'roomId') && token.roomId !== l.roomId) { return false;
            }
            if (Object.prototype.hasOwnProperty.call(token,'commandId') && token.commandId !== l.commandId) { return false;
            }
            if (Object.prototype.hasOwnProperty.call(token,'dialogueId') && token.dialogueId !== l.dialogueId) { return false;
            }
            if (Object.prototype.hasOwnProperty.call(token,'cutsceneId') && token.cutsceneId !== l.cutsceneId) { return false;
            }
            if (Object.prototype.hasOwnProperty.call(token,'movementId') && token.movementId !== l.movementId) { return false;
            }
            if (Object.prototype.hasOwnProperty.call(token,'characterMoveId')) { var cm=token.characterId ? (l.characterMoveIds[token.characterId]||0) : l.characterMoveId;
                if (token.characterMoveId !== cm) { return false;
                }
            }
            if (Object.prototype.hasOwnProperty.call(token,'objectAnimationId')) { var om=token.objectId ? (l.objectAnimationIds[token.objectId]||0) : l.objectAnimationId;
                if (token.objectAnimationId !== om) { return false;
                }
            }
            return true;
        },
        BumpSession: function () {
            var l=this.Ensure();
            l.sessionId++;
            l.roomId++;
            l.commandId++;
            l.dialogueId++;
            l.cutsceneId++;
            l.movementId++;
            l.characterMoveId++;
            l.objectAnimationId++;
            l.characterMoveIds={};
            l.objectAnimationIds={};
            return l.sessionId;
        },
        BumpRoom: function () { var l=this.Ensure();
            l.roomId++;
            l.dialogueId++;
            l.movementId++;
            l.characterMoveId++;
            l.objectAnimationId++;
            l.characterMoveIds={};
            l.objectAnimationIds={};
            return l.roomId;
        },
        BumpCommand: function () { var l=this.Ensure();
            l.commandId++;
            return l.commandId;
        },
        BumpDialogue: function () { var l=this.Ensure();
            l.dialogueId++;
            return l.dialogueId;
        },
        BumpCutscene: function () { var l=this.Ensure();
            l.cutsceneId++;
            return l.cutsceneId;
        },
        BumpMovement: function () { var l=this.Ensure();
            l.movementId++;
            return l.movementId;
        },
        BumpCharacterMove: function (characterId) { var l=this.Ensure();
            if (characterId) { l.characterMoveIds[characterId]=(l.characterMoveIds[characterId]||0)+1;
                return l.characterMoveIds[characterId];
            }
            l.characterMoveId++;
            return l.characterMoveId;
        },
        BumpObjectAnimation: function (objectId) { var l=this.Ensure();
            if (objectId) { l.objectAnimationIds[objectId]=(l.objectAnimationIds[objectId]||0)+1;
                return l.objectAnimationIds[objectId];
            }
            l.objectAnimationId++;
            return l.objectAnimationId;
        },
        Wrap: function (callback, token) {
            if (!callback) { return null;
            }
            return function () {
                if (!Engine.Lifecycle.IsCurrent(token)) { return;
                }
                return callback.apply(this,arguments);
            };
        }
    };
    // ACTION RESULT SYSTEM
    // --------------------
    // All deferred engine callbacks use a standard result object instead of a
    // bare success callback. The result is deliberately plain save-safe data:
    //   status: completed, blocked, cancelled, superseded, transitioned or ended
    //   action: walk, dialogue, characterMove, objectAnimation, input or cutscene
    //   reason: optional machine-readable detail such as collision or roomChange
    //   reached: true only when the requested destination/action was reached
    //   actorId, targetId, blockerId, roomId: optional diagnostic ids
    //   continueCutscene: false tells the cutscene sequencer to stop cleanly
    // callbackStatus, callbackResult and callbackResults are effective properties
    // so templates and individual objects can standardise or override callback
    // outcomes without duplicating movement, dialogue or cutscene code.
    Engine.ActionResults = {

                queueImage(h.closedSprite,'hotspot');
                queueImage(h.openSprite,'hotspot');
                queueImage(h.emptySprite,'hotspot');
