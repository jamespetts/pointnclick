        DEPLOYMENT MODEL
        ----------------
        - index.html contains the generic engine and bootloader.
        - games.json lists compatible games when running from a web server.
        - games.js is a direct-file fallback for browsers that block local JSON fetches.
        - Each game should normally live in its own <gameid>/ folder.
        - Each game should normally have one content script named <gameid>/<gameid>.js.
        - Each game manifest entry gives both the script path and the assetPath.
        - The assetPath should normally be <gameid>/ and is the base for game assets.
        - All manifest paths must be relative to this index.html file.
        - No login, database, server-side code, or build step is required.

        INSTRUCTIONS FOR FUTURE AIS AND MAINTAINERS
        -------------------------------------------
        - Do not modify this engine when merely writing a new adventure script or creating assets.
        - If a requested adventure action cannot be implemented through the public content API,
          flag the engine shortcoming for human review.
        - Do not reach into private engine state or duplicate engine systems in a game script.
        - Spaghetti code is forbidden.

        ARCHITECTURAL CONSTRAINTS
        -------------------------
        - There is exactly one canonical runtime state object.
        - There is exactly one player inventory.
        - There is exactly one player actor representation.
        - There is exactly one movement controller and one movement code path.
        - There is exactly one interaction dispatcher and one interaction path.
        - There is exactly one dialogue/text/voice presentation path.
        - There is exactly one registered handler function per verb.
        - The renderer reads state. It does not own narrative logic.
        - Game content scripts define data and content actions only.
        - Game content scripts must use the public engine API to mutate state.
        - Engine code must remain narrative-agnostic.
        - Dynamic story text uses the built-in readable bitmap text path, not raw
          canvas fillText. The glyphs are deliberately one-pixel-stroke,
          variable-width shapes with visible counters at 320x200 scale. Verbs
          use the same readable glyphs with light UI chrome treatment; do not
          replace this with tiny anti-aliased browser fonts without a legibility
          simulation at logical resolution.
        - Do not add ellipses to wrapped text unless a line is actually truncated
          to fit a fixed-size text box.
        - Spoken character dialogue is rendered above the relevant actor. Non-speaker
          narration and object descriptions, including Look At responses, are rendered
          in the lower UI panel so that they cannot run off the scene area or obscure
          characters. Future scripts should use api.Say(...) for spoken character
          dialogue and api.Narrate(...) for descriptive interface text.
        - Dialogue choices are selected from the lower UI panel, but a chosen line
          is then spoken by the player actor using the normal api.Say('player', ...)
          path before the selected response script runs. This keeps player speech,
          text placement and talking animation on the same canonical dialogue path
          as NPC speech.
        - Missing verb/object interactions use the central refusal-text resolver.
          Refusals may be overridden per object with target.refusals, or per game
          with game.defaultRefusals. Object refusals take precedence over game
          refusals, which take precedence over engine defaults.
        - Room transitions are data-defined by each room's transitionZones array.
          Transition checks run through the room system and are triggered from the
          single movement update path when the canonical player position enters a
          zone. Game scripts must not implement their own movement or transition
          loops for ordinary room exits.
        - Inventory items are also interaction targets. Single-target inventory
          actions such as Look At, Open and Close go through the same interaction
          dispatcher as world objects. Use and Give remain two-target verbs: first
          click the inventory item, then click the world or inventory target. This
          supports inventory-object-with-inventory-object interactions without a
          second inventory command path.
        - A room hotspot/object that represents a pickupable inventory item may set
          itemId:'inventoryItemId'. The room target keeps its own walkTo, visibility,
          pickup and room-specific behaviour, but unhandled interactions, default
          text and refusal text may inherit from the linked inventory item. Future
          game-writing AIs should use itemId for a world instance of the same item,
          and should only override text/interactions on the room target when the
          room context genuinely differs. For graphics, item.icon is the inventory
          graphic. A room target may set sprite for a room-specific appearance; if
          it does not, the renderer falls back to item.worldSprite and then item.icon.
          This lets the same object be drawn differently in a room and in inventory
          without creating duplicate gameplay objects.
        - Room object runtime state is owned by Engine.RoomObjects and stored in
          Engine.State.objectStates. Use api.SetObjectState(...) for stateful
          room-object behaviour such as disabling a door's hotspot after opening,
          changing a hotspot rectangle, or hiding a room object. Do not duplicate
          hit testing or movement in a game script for this.
        - Overlapping hotspots/characters are resolved by hitPriority, priority or
          zIndex, with higher values winning. Use this sparingly for small objects
          sitting on larger surfaces, such as a coin on a table; do not reorder data
          arrays merely to fix overlap unless the intended drawing/data order also
          changes.
        - Inventory scrolling is owned by the central inventory system. The UI
          renders a fixed visible window with up/down arrows and resolves clicks
          through Engine.Inventory.GetItemAtPoint(). Game scripts must not render
          or scroll inventory themselves. Inventory icons are scaled down by the
          renderer to fit the visible inventory slot. Inventory item names are
          shown by the central renderer as hover tooltip text; game scripts must
          not implement a second inventory tooltip or icon rendering path. Taking
          an item from the inventory uses the central already-have message; game
          scripts should not add duplicate take refusals merely to say that the
          item is already carried.
        - The lower command interface can be styled through game.ui. A game may set
          verbInventoryBackground, verbColor, verbSelectedColor, textColor and
          per-character dialogueColor values. The themed
          verb/inventory background is shown only during normal command UI and must
          be hidden behind narration panels and dialogue choices for readability.
        - Pathfinding is owned by the single movement controller. Rooms may define
          a walkGraph with nodes and edges; the movement controller builds a route
          from the player to the requested destination and then advances through
          the resulting waypoints. Game scripts must not move the player by
          creating separate movement loops.
        - Pathfinding chooses routes; character avoidance is a separate central
          room-system concern. The room system applies active NPC avoidance between
          the player and all visible room characters, and between visible room
          characters themselves, from the same single movement update path. Game
          scripts must not implement local collision/avoidance loops.
        - Followers must follow the player's movement trail, not a fixed screen-side
          offset. A follower waits until the player has opened a configurable gap,
          then moves towards an older point on the player trail so that the follower
          naturally follows behind the player's direction of travel. Active NPC
          avoidance may move NPCs locally out of the way, but the follower trail is
          the canonical target for followPlayer characters.
        - The intro, main menu and options screens are engine states, not game
          script loops. They use game-defined titleBackground, titleMusic and
          author metadata. ESC opens the main menu during play. Audio failures
          must fail silently so missing optional music or sound files do not
          produce crashes or boot errors.
        - Save/load uses browser localStorage through the central SaveLoad
          system. Saves must capture the canonical game state, including room,
          player, inventory, flags, variables, object/room/character states and
          mutable runtime room characters. Menus list compatible saved games and
          show clear default text when no saved games are available. Save data has
          its own SAVE_DATA_VERSION, separate from ENGINE_API_VERSION. Any breaking
          save-format change must increment SAVE_DATA_VERSION and add a migration
          or a clear incompatibility path in SaveLoad.MigrateSaveData().
        - IMPORTANT FOR FUTURE MAINTAINERS AND AIS: if any new gameplay state is
          added anywhere in the engine, it must be added to SaveLoad.BuildData()
          and SaveLoad.Load() at the same time. Do not add mutable state without
          adding save/load support for it in the same change.
        - The same new gameplay state must also be reset by
          Engine.Private.ResetGameData(), so New Game always starts from a clean
          canonical runtime session. Do not add mutable state without adding both
          save/load and reset support in the same change.
        - If PlayMusic is asked to play the same track that is already playing,
          it must not restart the Audio object. This preserves seamless music
          across adjacent rooms with the same room.music value. If the same Audio
          object is paused because autoplay was blocked, PlayMusic may retry it.
        - The end screen may use game-defined endBackground and endMusic fields.
          Clicking the end screen returns to the main menu and clears the
          in-memory active game session, so Resume Game is disabled after
          completion.
        - Secondary pointer activation, including right-click and option/alt-click,
          is always interpreted as Walk To in the scene, regardless of the selected
          verb. Do not implement a second movement path for this shortcut.
        - NPC followers are ordinary room characters with followPlayer:true. They
          are advanced from the single movement update path and are re-positioned
          by the room system when the player enters a new room. Do not create a
          second NPC movement loop in game scripts.
        - Non-following NPCs can also move through api.MoveCharacter(). Character
          movement is advanced from the same movement update path as the player
          and followers. Game scripts should request movement; they should not
          create their own character animation or movement loops.
        - Character sprites may use directional rows in the same order as the
          player sprite: down, left, right, up. Set directional:true, or rows:4,
          in the sprite definition. Single-row sprites remain supported. Idle
          animations are supported through sprite.animations.idle with frames and
          fps, or through sprite.idleFrames and sprite.idleFps when no explicit
          idle animation is defined. Idle animation timing is per actor, so a room
          full of characters does not have to bob in perfect synchronisation.
        - Character perspective scaling is owned by the renderer. To make actors
          smaller at the back of a room and larger at the front, set a room-level
          scale profile such as characterScale:{ farY:86, nearY:134,
          farScale:0.72, nearScale:1.15 }. The aliases perspectiveScale,
          backY/frontY and backScale/frontScale are also accepted. Actor scale is
          still honoured as a base multiplier; set scaleWithPerspective:false or
          fixedScale:true on an actor to opt out. Game scripts must not resize
          sprites directly.
        - Talking animation is a built-in dialogue presentation feature: if the
          speaking actor's sprite defines an animation named talk, api.Say(...)
          uses it automatically for that spoken line. Other named animations are
          content-defined and must be triggered through api.SetAnimation(...)
          and api.ClearAnimation(...). The engine must not contain narrative-
          specific animation names such as tail wagging.
        - Lifecycle hooks are central engine extension points, not replacement
          game loops. Game scripts may define game.hooks entries such as
          beforeRoomEnter, afterRoomEnter, beforeRoomExit, afterRoomExit,
          beforeTransition, afterTransition, beforeCommand, afterCommand,
          onInventoryChanged, beforeCutscene, afterCutscene, onMenuEnter and
          onMenuExit. Rooms may define beforeEnter/onBeforeEnter,
          afterEnter/onAfterEnter, beforeExit/onBeforeExit and
          afterExit/onAfterExit. Transition zones may define beforeTransition,
          onBeforeTransition, afterTransition and onAfterTransition. Hook
          scripts receive (api, context). Returning false from a before hook
          cancels that operation.
        - Per-object variables are stored centrally in Engine.State.scopedVariables
          and must be accessed through the public API. Use room, character and
          item variable helpers for puzzle state that belongs to a specific
          entity, rather than inventing parallel state objects in game scripts.
          Scoped variables are saved, loaded and reset by the engine. Values must
          be strings or finite numbers. Arithmetic helpers validate types and
          write clear debug warnings for invalid operations such as adding to a
          string or dividing by zero.
        - Multiple endings are supported through game.endings and api.ShowEnding().
          A game may define game.endings.good, game.endings.bad, etc. Each ending
          may set title, text, background or endBackground, music or endMusic,
          sound or sfx, and animation. The animation is drawn on top of the ending
          background by the central renderer. Do not implement separate ending
          screens in game scripts. Use api.ShowEnding('endingId') for data-defined
          endings, or api.EndGame(title, text, options) for a one-off ending.
          Ending animations use the same lightweight sprite-sheet convention as
          room object animations: image, x, y, frameW, frameH, frames, fps, loop.
          Optional sound effects are one-shot and use the normal audio settings.
          If an ending or one-off api.EndGame() call omits music/endMusic, the
          engine falls back to game.endMusic so older games keep their existing
          end music. To deliberately end in silence, set music:[] on that ending.
        - Dialogue trees are data-defined in game.dialogueTrees and started with
          api.StartDialogue(treeId). This is deliberately more declarative than
          hand-written branching scripts so future AIs can author conversations
          reliably. Nodes contain speakerId, text and choices. Choices may define
          id, text, playerText, response, next, script, conditions, actions and
          persistence. By default, a choice with an id is hidden after use; set
          repeat:true, stay:true or hideAfterUse:false to keep it. Use conditions
          to show choices only when flags, inventory or variables match. Use
          templates such as {{var:playerName}}, {{flag:doorOpen}},
          {{room:kitchen.visits}}, {{character:guard.mood}} and
          {{item:key.label}} in player text, NPC text and choices. Use
          api.AskText() or api.AskNumber() for player input such as naming the
          protagonist; store that input in a normal variable or scoped variable
          and refer to it through placeholders. Dialogue choices are word-wrapped
          by the central renderer and pointer hit-testing uses the same wrapped
          layout, so long AI-authored choices must not draw their own choice UI.
          Dialogue actions may also addItem/removeItem, so a dialogue option can
          perform the same inventory exchange as a Give command while keeping the
          ordinary Give path available.
    -->

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #050507; overflow: hidden; touch-action: none; }
        body { display: flex; align-items: center; justify-content: center; font-family: monospace; }
        #gameCanvas { width: min(100vw, calc(100vh * 4 / 3)); height: min(100vh, calc(100vw * 3 / 4)); image-rendering: pixelated; image-rendering: crisp-edges; background: #000; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="320" height="200" aria-label="Point and click adventure game"></canvas>

    <script>
'use strict';

(function () {

    var ENGINE_API_VERSION = 1;
    var SAVE_DATA_VERSION = 5;
    var LOGICAL_WIDTH = 320;
    var LOGICAL_HEIGHT = 200;
    var SCENE_HEIGHT = 136;
    var UI_TOP = 136;
    var TARGET_FPS = 12;
    var FIXED_DT = 1 / TARGET_FPS;

    function Clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function Distance(ax, ay, bx, by) { var dx = bx - ax; var dy = by - ay; return Math.sqrt(dx * dx + dy * dy); }
    function PointInRect(x, y, rect) { return x >= rect.x && y >= rect.y && x < rect.x + rect.w && y < rect.y + rect.h; }
    function DeepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function CapitaliseFirst(value) { var s = String(value || ''); return s.length ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

    var BitmapFont = {
        width: 5,
        height: 7,
        spacing: 1,
        lineHeight: 8,
        glyphs: {
            'A':['01110','10001','10001','11111','10001','10001','10001'], 'B':['11110','10001','10001','11110','10001','10001','11110'],
            'C':['01111','10000','10000','10000','10000','10000','01111'], 'D':['11110','10001','10001','10001','10001','10001','11110'],
            'E':['11111','10000','10000','11110','10000','10000','11111'], 'F':['11111','10000','10000','11110','10000','10000','10000'],
            'G':['01111','10000','10000','10011','10001','10001','01111'], 'H':['10001','10001','10001','11111','10001','10001','10001'],
            'I':['11111','00100','00100','00100','00100','00100','11111'], 'J':['00111','00010','00010','00010','10010','10010','01100'],
            'K':['10001','10010','10100','11000','10100','10010','10001'], 'L':['10000','10000','10000','10000','10000','10000','11111'],
            'M':['10001','11011','10101','10101','10001','10001','10001'], 'N':['10001','11001','10101','10011','10001','10001','10001'],
            'O':['01110','10001','10001','10001','10001','10001','01110'], 'P':['11110','10001','10001','11110','10000','10000','10000'],
            'Q':['01110','10001','10001','10001','10101','10010','01101'], 'R':['11110','10001','10001','11110','10100','10010','10001'],
            'S':['01111','10000','10000','01110','00001','00001','11110'], 'T':['11111','00100','00100','00100','00100','00100','00100'],
            'U':['10001','10001','10001','10001','10001','10001','01110'], 'V':['10001','10001','10001','10001','10001','01010','00100'],
            'W':['10001','10001','10001','10101','10101','10101','01010'], 'X':['10001','10001','01010','00100','01010','10001','10001'],
            'Y':['10001','10001','01010','00100','00100','00100','00100'], 'Z':['11111','00001','00010','00100','01000','10000','11111'],
            '0':['01110','10001','10011','10101','11001','10001','01110'], '1':['00100','01100','00100','00100','00100','00100','01110'],
            '2':['01110','10001','00001','00010','00100','01000','11111'], '3':['11110','00001','00001','01110','00001','00001','11110'],
            '4':['00010','00110','01010','10010','11111','00010','00010'], '5':['11111','10000','10000','11110','00001','00001','11110'],
            '6':['01110','10000','10000','11110','10001','10001','01110'], '7':['11111','00001','00010','00100','01000','01000','01000'],
            '8':['01110','10001','10001','01110','10001','10001','01110'], '9':['01110','10001','10001','01111','00001','00001','01110'],
            '.':['00000','00000','00000','00000','00000','01100','01100'], ',':['00000','00000','00000','00000','01100','01100','01000'],
            ':':['00000','01100','01100','00000','01100','01100','00000'], ';':['00000','01100','01100','00000','01100','01100','01000'],
            '!':['00100','00100','00100','00100','00100','00000','00100'], '?':['01110','10001','00001','00010','00100','00000','00100'],
            '-':['00000','00000','00000','11111','00000','00000','00000'], '+':['00000','00100','00100','11111','00100','00100','00000'], '%':['11001','11010','00100','01000','10110','00110','00000'],
            '/':['00001','00010','00010','00100','01000','01000','10000'], '(':['00010','00100','01000','01000','01000','00100','00010'],
            ')':['01000','00100','00010','00010','00010','00100','01000'], '>':['10000','01000','00100','00010','00100','01000','10000'],
            '<':['00001','00010','00100','01000','00100','00010','00001'], '*':['00000','10101','01110','11111','01110','10101','00000'],
            '_':['00000','00000','00000','00000','00000','00000','11111'], ' ':['00000','00000','00000','00000','00000','00000','00000'],
            "'":['00100','00100','01000','00000','00000','00000','00000'], '"':['01010','01010','00000','00000','00000','00000','00000']
        }
    };

    var Engine = {};
    window.PointClickEngine = Engine;
    Engine.Private = {};
    Engine.Games = {};
    Engine.CurrentGame = null;
    Engine.Canvas = document.getElementById('gameCanvas');
    Engine.Ctx = Engine.Canvas.getContext('2d');
    Engine.Ctx.imageSmoothingEnabled = false;

    Engine.State = {
        mode: 'boot', gameId: null, currentRoomId: null, selectedVerbId: 'walkTo', selectedInventoryItemId: null,
        hoveredTargetId: null, hoveredInventoryItemId: null, pointerX: 0, pointerY: 0, pendingCommand: null,
        activeCutscene: null, cutsceneQueue: [], flags: {}, variables: {}, dialogueMemory: {}, inputPrompt: null, scopedVariables: { rooms:{}, characters:{}, items:{} }, roomStates: {}, objectStates: {}, characterStates: {}, inventory: [], inventoryScroll: 0,
        endGame: { title: '', text: '', endingId: null, background: null, animation: null, animationStarted: 0 },
        gameStarted: false,
        previousMode: null,
        saveLoadList: [], saveLoadMessage: '', debugMessages: [], playerTrail: [],
        audio: { musicVolume: 0.25, sfxVolume: 0.75, musicMuted: false, sfxMuted: false },
        dialogue: { active: false, speakerId: null, speakerName: '', text: '', displayText: '', timer: 0, duration: 0, explicitDuration: null, options: [], onComplete: null, voiceAudio: null, color: null, textBlocks: [], textBlockIndex: 0 },
        player: { id: 'player', roomId: null, x: 80, y: 112, facing: 'down', animation: 'idleDown', visible: true, controllable: true, speed: 48, walkTarget: null, walkPath: [], walkCallback: null, spriteId: null, scale: 1 },
        debug: false
    };

    Engine.Assets = {
        images: {}, music: null, musicSrc: null,
        Resolve: function (path) {
            if (!Engine.CurrentGame) { return path; }
            if (/^(https?:)?\/\//.test(path) || path.indexOf('data:') === 0) { return path; }
            return Engine.CurrentGame.assetPath + path;
        },
        LoadImage: function (path) {
            var resolved = this.Resolve(path);
            if (this.images[resolved]) { return Promise.resolve(this.images[resolved]); }
            return new Promise(function (resolve, reject) {
                var img = new Image();
                img.onload = function () { Engine.Assets.images[resolved] = img; resolve(img); };
                img.onerror = function () { reject(new Error('Could not load image: ' + resolved)); };
                img.src = resolved;
            });
        },
        GetImage: function (path) { return this.images[this.Resolve(path)] || null; },
        ApplyAudioSettings: function () {
            if (this.music) { this.music.volume = Engine.State.audio.musicMuted ? 0 : Engine.State.audio.musicVolume; }
        },
        TryPlayMusic: function () {
            if (!this.music) { return; }
            this.ApplyAudioSettings();
            var playPromise = this.music.play();
            if (playPromise && playPromise.catch) { playPromise.catch(function () {}); }
        },
        PlayMusic: function (sources) {
            if (!sources || !sources.length) { this.StopMusic(); return; }
            var src = this.Resolve(sources[0]);
            if (this.musicSrc === src && this.music) {
                this.ApplyAudioSettings();
                if (this.music.paused) { this.TryPlayMusic(); }
                return;
            }
            this.StopMusic();
            var audio = new Audio();
            audio.preload = 'metadata'; audio.loop = true; audio.src = src;
            audio.volume = Engine.State.audio.musicMuted ? 0 : Engine.State.audio.musicVolume;
            audio.onerror = function () { if (Engine.Assets.music === audio) { Engine.Assets.StopMusic(); } };
            this.music = audio; this.musicSrc = src;
            this.TryPlayMusic();
        },
        StopMusic: function () { if (this.music) { this.music.pause(); this.music.src = ''; } this.music = null; this.musicSrc = null; },
        PlaySound: function (sources) {
            if (!sources || !sources.length || Engine.State.audio.sfxMuted) { return; }
            var audio = new Audio(this.Resolve(sources[0])); audio.preload = 'auto'; audio.volume = Engine.State.audio.sfxVolume;
            audio.onerror = function () {};
            var playPromise = audio.play(); if (playPromise && playPromise.catch) { playPromise.catch(function () {}); }
        }
    };


    // DEBUG, HOOK AND SCOPED VARIABLE SYSTEMS
    // --------------------------------------
    // Engine.Debug is the central diagnostic path for content-authoring mistakes.
    // It logs to the browser console and keeps a short in-memory message list so
    // a future debug UI can display recent problems without each game script
    // inventing its own logger.
    //
    // Engine.Hooks is the single lifecycle-hook dispatcher. Hook scripts are
    // normal game scripts looked up by name in game.scripts. They receive
    // (api, context) and may return false from "before" hooks to cancel the
    // current operation. Hook entries may be a single script name or an array of
    // script names. Missing hook scripts do not crash the game; they produce a
    // clear debug warning and the operation continues.
    //
    // Engine.ScopedVariables stores per-room, per-character and per-item variables
    // in Engine.State.scopedVariables. Game scripts must use the public API
    // wrappers rather than writing directly to this object. Values are deliberately
    // restricted to strings and finite numbers so saves remain stable and puzzle
    // state stays easy to inspect. Arithmetic helpers operate only on numbers and
    // report detailed debug warnings for bad scope names, bad ids, missing scripts,
    // arithmetic on strings, non-finite numbers and division by zero.
    Engine.Debug = {
        Add: function (level, message) {
            var text='[PointClickEngine] '+level+': '+message;
            if (window.console) {
                if (level === 'ERROR' && console.error) { console.error(text); }
                else if (level === 'WARN' && console.warn) { console.warn(text); }
                else if (console.log) { console.log(text); }
            }
            Engine.State.debugMessages=Engine.State.debugMessages||[];
            Engine.State.debugMessages.push({ level:level, message:message });
            while (Engine.State.debugMessages.length>60) { Engine.State.debugMessages.shift(); }
        },
        Warn: function (message) { this.Add('WARN',message); },
        Error: function (message) { this.Add('ERROR',message); },
        Info: function (message) { this.Add('INFO',message); }
    };
    Engine.Hooks = {
        NormaliseList: function (scripts) {
            if (!scripts) { return []; }
            if (Array.isArray(scripts)) { return scripts; }
            return [scripts];
        },
        RunScript: function (scriptName, context, label) {
            if (!scriptName) { return true; }
            if (typeof scriptName !== 'string') { Engine.Debug.Warn('Hook '+(label||'unknown')+' ignored because script name is not a string.'); return true; }
            if (!Engine.CurrentGame || !Engine.CurrentGame.scripts || !Engine.CurrentGame.scripts[scriptName]) { Engine.Debug.Warn('Hook '+(label||'unknown')+' references missing script "'+scriptName+'".'); return true; }
            try { return Engine.CurrentGame.scripts[scriptName](Engine.API, context||{}) !== false; }
            catch (err) { Engine.Debug.Error('Hook '+(label||scriptName)+' failed: '+(err && err.message ? err.message : err)); return true; }
        },
        RunList: function (scripts, context, label) {
            var list=this.NormaliseList(scripts);
            for (var i=0;i<list.length;i++) { if (this.RunScript(list[i],context,label) === false) { return false; } }
            return true;
        },

        RenderTextInputPanel: function () { var p=Engine.State.inputPrompt||{}; this.RenderUIPanelBackground(true); this.RenderWrappedLinesInBox(p.prompt||'Enter text:',8,142,304,18,this.GetTextColor('narrationTextColor','#ffffff'),false); var value=String(p.value||''); var suffix=(Math.floor(this.frameTime*2)%2) ? '_' : ''; this.TextWithShadow(value+suffix,8,166,this.GetTextColor('commandTextColor','#55ff55')); this.TextWithShadow('Enter accepts, Esc cancels',8,190,this.GetTextColor('choiceTextColor','#ffffff')); },
        DrawInventoryArrow: function (x, y, direction, enabled) { var ctx=Engine.Ctx; ctx.fillStyle=enabled ? '#ffffff' : '#606060'; ctx.beginPath(); if (direction === 'up') { ctx.moveTo(x+7,y+2); ctx.lineTo(x+2,y+12); ctx.lineTo(x+12,y+12); } else { ctx.moveTo(x+2,y+2); ctx.lineTo(x+12,y+2); ctx.lineTo(x+7,y+12); } ctx.closePath(); ctx.fill(); },
        RenderInventoryArrows: function () { this.DrawInventoryArrow(304,142,'up',Engine.Inventory.CanScrollUp()); this.DrawInventoryArrow(304,166,'down',Engine.Inventory.CanScrollDown()); },
        GetInventoryIconMaxSize: function () { var ui=this.GetUIConfig(); return { w:ui.inventoryIconMaxW||16, h:ui.inventoryIconMaxH||16 }; },
        // CONTENT AUTHORING NOTE FOR FUTURE AIS:
        // Inventory icons may re-use world-object art and can therefore be larger
        // than the inventory slot. Do not require every game to create separate
        // tiny icon art. The central renderer scales icons down, preserving aspect
        // ratio, so they fit inside the fixed inventory grid. It never scales small

        DrawInventoryIcon: function (item, x, y) { if (!item || !item.icon) { return; } var img=Engine.Assets.GetImage(item.icon); if (!img) { return; } var max=this.GetInventoryIconMaxSize(); var iw=img.naturalWidth||img.width; var ih=img.naturalHeight||img.height; if (!iw || !ih) { return; } var scale=Math.min(1,max.w/iw,max.h/ih); var dw=Math.max(1,Math.floor(iw*scale)); var dh=Math.max(1,Math.floor(ih*scale)); var dx=x+Math.floor((Engine.Inventory.cell-dw)/2); var dy=y+Math.floor((Engine.Inventory.cell-dh)/2); Engine.Ctx.drawImage(img,dx,dy,dw,dh); },
        // CONTENT AUTHORING NOTE FOR FUTURE AIS:
        // Inventory item names are displayed here as a hover tooltip. Game scripts

        RenderInventoryHoverLabel: function () { if (Engine.State.mode!=='play' || Engine.State.dialogue.active || !Engine.State.hoveredInventoryItemId) { return; } var item=Engine.CurrentGame.items[Engine.State.hoveredInventoryItemId]; if (!item) { return; } var label=CapitaliseFirst(item.name||Engine.State.hoveredInventoryItemId); var w=this.MeasureText(label); var h=this.GetLineHeight(); var x=Clamp(Engine.State.pointerX+6,2,318-w); var y=Clamp(Engine.State.pointerY-12,UI_TOP+2,LOGICAL_HEIGHT-h-2); this.Rect(x-2,y-2,w+4,h+3,'rgba(0,0,0,0.68)'); this.TextWithShadow(label,x,y,this.GetTextColor('hoverTextColor','#ffff55')); },
        RenderUI: function () {
            var d=Engine.State.dialogue;
            if (d.active && !d.speakerId && !(d.options && d.options.length)) { this.RenderNarrationPanel(); return; }
            if (d.active && d.options && d.options.length) { this.RenderDialogueChoices(); return; }
            this.RenderUIPanelBackground(false);
            for (var v=0;v<Engine.Verbs.list.length;v++) { var verb=Engine.Verbs.list[v]; var selected=verb.id===Engine.State.selectedVerbId; this.RenderVerbLabel(verb,selected); }

            var command=Engine.Verbs.GetLabel(Engine.State.selectedVerbId); if (Engine.State.selectedInventoryItemId) { command += ' ' + Engine.CurrentGame.items[Engine.State.selectedInventoryItemId].name + (Engine.State.selectedVerbId === 'give' ? ' to' : ' with'); } if (Engine.State.hoveredTargetId) { var t=Engine.Interactions.GetTarget(Engine.State.hoveredTargetId); if (t) { command += ' ' + t.name; } } else if (Engine.State.hoveredInventoryItemId && Engine.State.selectedInventoryItemId && Engine.CurrentGame.items[Engine.State.hoveredInventoryItemId]) { command += ' ' + Engine.CurrentGame.items[Engine.State.hoveredInventoryItemId].name; } this.Text(command,4,190,this.GetTextColor('commandTextColor','#55ff55')); this.RenderInventoryHoverLabel();
        },
        RenderDebug: function () { this.Rect(0,0,140,34,'rgba(0,0,0,0.75)'); this.Text('Room: '+Engine.State.currentRoomId,2,2,'#00ff00'); this.Text('Player: '+Math.round(Engine.State.player.x)+','+Math.round(Engine.State.player.y),2,12,'#00ff00'); this.Text('Verb: '+Engine.State.selectedVerbId,2,22,'#00ff00'); },
        WrapText: function (text,x,y,maxWidth,color) { var lines=this.BuildWrappedLines(text,maxWidth); for (var i=0;i<lines.length;i++) { this.Text(lines[i],x,y+i*this.GetLineHeight(),color); } }
    };

    Engine.Private.LastTimestamp=0; Engine.Private.Accumulator=0;
    Engine.Private.Update = function (dt) { if (Engine.State.mode==='play' || Engine.State.mode==='cutscene') { Engine.Movement.Update(dt); Engine.RoomObjects.Update(dt); Engine.Dialogue.Update(dt); } };
    Engine.Private.Loop = function (timestamp) { if (!Engine.Private.LastTimestamp) { Engine.Private.LastTimestamp=timestamp; } var elapsed=Math.min(0.25,(timestamp-Engine.Private.LastTimestamp)/1000); Engine.Private.LastTimestamp=timestamp; Engine.Private.Accumulator += elapsed; Engine.Renderer.frameTime += elapsed; while (Engine.Private.Accumulator >= FIXED_DT) { Engine.Private.Update(FIXED_DT); Engine.Private.Accumulator -= FIXED_DT; } Engine.Renderer.Render(); requestAnimationFrame(Engine.Private.Loop); };
    Engine.Private.Boot(); requestAnimationFrame(Engine.Private.Loop);
